<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Windows 95 Help Book Style -->
  
  <!-- Book Shadow -->
  <rect x="10" y="8" width="16" height="18" fill="#808080" />
  
  <!-- Book Cover (Yellow) -->
  <rect x="8" y="6" width="16" height="18" fill="#ffff00" />
  
  <!-- Book Binding (Dark Yellow) -->
  <rect x="8" y="6" width="3" height="18" fill="#808000" />
  
  <!-- Book Edges (Black Outline) -->
  <path d="M8 6h16v1H8zM8 6h1v18H8zM8 23h16v1H8zM23 6h1v18h-1z" fill="#000" />
  
  <!-- Pages (White) -->
  <rect x="24" y="7" width="2" height="16" fill="#fff" />
  <rect x="24" y="7" width="2" height="1" fill="#000" />
  <rect x="24" y="22" width="2" height="1" fill="#000" />
  <rect x="25" y="7" width="1" height="16" fill="#000" />

  <!-- Question Mark on Cover (Purple/Blue) -->
  <rect x="14" y="10" width="6" height="2" fill="#800080" />
  <rect x="18" y="12" width="2" height="2" fill="#800080" />
  <rect x="14" y="14" width="6" height="2" fill="#800080" />
  <rect x="14" y="16" width="2" height="2" fill="#800080" />
  <rect x="15" y="20" width="2" height="2" fill="#800080" />
</svg>
