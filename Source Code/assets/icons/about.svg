<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Info Icon - Pixel Art Style -->
  <!-- Outer Shadow -->
  <rect x="6" y="6" width="20" height="20" fill="#000" />
  
  <!-- Main Circle Background (Blue) -->
  <rect x="7" y="7" width="18" height="18" fill="#0000ff" />
  
  <!-- Highlight (Light Blue) -->
  <path d="M7 7h18v1H7zM7 7h1v18H7z" fill="#8080ff" />
  
  <!-- Shadow (Dark Blue) -->
  <path d="M7 24h18v1H7zM24 7h1v18h-1z" fill="#000080" />
  
  <!-- Corner Clipping to make it "Round" -->
  <rect x="7" y="7" width="2" height="2" fill="none" /> <!-- Transparent corners if background allowed, but for now just leave it square or clip -->
  <path d="M7 7h3v3H7zM22 7h3v3h-3zM7 22h3v3H7zM22 22h3v3h-3z" fill="none" />
  
  <!-- The White 'i' -->
  <!-- Dot -->
  <rect x="14" y="10" width="4" height="4" fill="#fff" />
  <!-- Stem -->
  <rect x="14" y="16" width="4" height="7" fill="#fff" />
  <!-- Base -->
  <rect x="12" y="22" width="8" height="2" fill="#fff" />
</svg>
