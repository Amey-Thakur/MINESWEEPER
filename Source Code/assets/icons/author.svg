<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16">
  <!-- High-Fidelity Pixel Art Octocat (Black) -->
  <!-- Tail -->
  <rect x="2" y="10" width="1" height="2" />
  <rect x="3" y="11" width="1" height="1" />
  
  <!-- Eras (Pixelated) -->
  <rect x="4" y="2" width="2" height="1" />
